{% extends "base.html" %}
{% block title %}New Assignment — SJEC Tasks{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Create Assignment</h1>
</div>

<div class="card" style="max-width:540px">
  <form method="POST">
    <div class="form-group">
      <label>Subject</label>
      <select name="subject_id" required>
        <option value="" disabled selected>Select a subject</option>
        {% for s in subjects %}
        <option value="{{ s.subject_id }}">{{ s.name }} ({{ s.code }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" placeholder="e.g. DAA Lab 4: Bellman-Ford" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Instructions, requirements…"></textarea>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Due date</label>
        <input type="date" name="due_date" required>
      </div>
      <div class="form-group">
        <label>Max marks</label>
        <input type="number" name="max_marks" value="10" min="1" max="100" required>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem">
      <button type="submit" class="btn btn-primary">Create assignment</button>
      <a href="{{ url_for('faculty_subjects') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
