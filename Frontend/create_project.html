{% extends "base.html" %}
{% block title %}New Project - Gara{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Create Project</h1>
</div>

<div class="card" style="max-width:540px">
  <form method="POST">
    <div class="form-group">
      <label>Subject</label>
      <select name="subject_id" required>
        <option value="" disabled selected>Select a subject</option>
        {% for s in subjects %}
        <option value="{{ s.subject_id }}">{{ s.name }} ({{ s.code }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" placeholder="e.g. Mini Project: Intrusion Detection" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Scope, objectives, deliverables…"></textarea>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Start date</label>
        <input type="date" name="start_date">
      </div>
      <div class="form-group">
        <label>End date</label>
        <input type="date" name="end_date">
      </div>
    </div>
    <div style="display:flex;gap:0.75rem">
      <button type="submit" class="btn btn-primary">Create project</button>
      <a href="{{ url_for('faculty_subjects') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
